name: Build, test and release

on:
  push:
    branches: [ '**' ]
  pull_request:
  workflow_dispatch:
    inputs:
      bump_level:
        description: "Version increment level"
        type: choice
        options:
          - patch
          - minor
          - major
        default: minor

permissions:
  contents: read
  checks: write
  actions: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_requested: ${{ steps.plan.outputs.release_requested }}
      package_version: ${{ steps.plan.outputs.package_version }}
      assembly_version: ${{ steps.plan.outputs.assembly_version }}
      file_version: ${{ steps.plan.outputs.file_version }}
      informational_version: ${{ steps.plan.outputs.informational_version }}
      previous_tag: ${{ steps.plan.outputs.previous_tag }}
    env:
      PACKAGE_JSON: Conduit.Unity/package.json

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Plan version metadata
        id: plan
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(
            git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags |
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' |
            head -n 1 ||
            true
          )"

          current="$(jq -r '.version' "$PACKAGE_JSON")"
          if [[ ! "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$current' is not SemVer (x.y.z)"
            exit 1
          fi

          release_requested=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_requested=true
            level="${{ inputs.bump_level }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/master" && "${{ contains(github.event.head_commit.message, '[skip release]') }}" != "true" ]]; then
            release_requested=true
            level="patch"
          else
            level=""
          fi

          package_version="$current"
          if [[ "$release_requested" == "true" ]]; then
            IFS='.' read -r major minor patch <<<"$current"

            case "$level" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unsupported bump level: '$level'"
                exit 1
                ;;
            esac

            package_version="$major.$minor.$patch"
          fi

          IFS='.' read -r major minor patch <<<"$package_version"
          assembly_version="$major.$minor.$patch.0"
          file_build=$(( GITHUB_RUN_NUMBER % 65535 ))
          if [[ "$file_build" -eq 0 ]]; then
            file_build=65534
          fi
          file_version="$major.$minor.$patch.$file_build"
          short_sha="${GITHUB_SHA::12}"
          informational_version="$package_version+sha.$short_sha"

          echo "release_requested=$release_requested" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "assembly_version=$assembly_version" >> "$GITHUB_OUTPUT"
          echo "file_version=$file_version" >> "$GITHUB_OUTPUT"
          echo "informational_version=$informational_version" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            publish_name: conduit-linux-x64
            publish_source: Conduit.Server/publish/linux-x64/conduit
            publish_target: conduit-linux-x64
          - os: windows-latest
            rid: win-x64
            publish_name: conduit-win-x64
            publish_source: Conduit.Server/publish/win-x64/conduit.exe
            publish_target: conduit-win-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build server binary
        shell: bash
        run: |
          dotnet publish Conduit.Server/Conduit.csproj -c Release -r "${{ matrix.rid }}" \
            -p:Version="${{ needs.version.outputs.package_version }}" \
            -p:AssemblyVersion="${{ needs.version.outputs.assembly_version }}" \
            -p:FileVersion="${{ needs.version.outputs.file_version }}" \
            -p:InformationalVersion="${{ needs.version.outputs.informational_version }}" \
            -p:IncludeSourceRevisionInInformationalVersion=false \
            -p:Company="${{ github.repository_owner }}" \
            -p:Product="${{ github.event.repository.name }}"
          mkdir -p "$RUNNER_TEMP/release"
          cp "${{ matrix.publish_source }}" "$RUNNER_TEMP/release/${{ matrix.publish_target }}"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.publish_name }}
          path: ${{ runner.temp }}/release/${{ matrix.publish_target }}

  test-server:
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run TUnit tests
        id: dotnet-tests
        continue-on-error: true
        run: |
          mkdir -p "$RUNNER_TEMP/test-results"
          dotnet run --project Conduit.Tests/Conduit.Tests.csproj \
            -- \
            --results-directory "$RUNNER_TEMP/test-results" \
            --report-trx \
            --report-trx-filename dotnet.trx

      - uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Dotnet Test Results
          reporter: dotnet-trx
          path: "${{ runner.temp }}/test-results/dotnet.trx"
          fail-on-error: false

      - name: Fail on dotnet test errors
        if: steps.dotnet-tests.outcome == 'failure'
        run: exit 1

  test-unity:
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT: /ConduitCI
      REPO_ROOT: /UnityConduitRepo
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        UNITY_VERSION: [
          # 6.5
          6000.5.0b4,
          # 6.4
          6000.4.3f1,
          # 6.3
          6000.3.13f1,
          # 6.2
          6000.2.15f1,
          # 6.1
          6000.1.17f1,
          # 6.0
          6000.0.73f1,
        ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: conduit-linux-x64
          path: ${{ runner.temp }}/conduit-server

      - name: Prepare server artifact
        run: chmod +x "$RUNNER_TEMP/conduit-server/conduit-linux-x64"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prep vars
        run: |
          REPO='${{ github.repository }}'
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "REPO_LC=$REPO_LC" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=ghcr.io/$REPO_LC/unity-ci:${{ github.sha }}-${{ matrix.UNITY_VERSION }}" >> "$GITHUB_ENV"
          echo "CACHE_REF=ghcr.io/$REPO_LC/unity-ci:cache-${{ matrix.UNITY_VERSION }}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          file: ./.github/workflows/Dockerfile
          push: false
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            UNITY_VERSION=${{ matrix.UNITY_VERSION }}
            PROJECT=${{ env.PROJECT }}
          secrets: |
            unity_serial=${{ secrets.UNITY_SERIAL }}
            unity_user=${{ secrets.UNITY_USER }}
            unity_password=${{ secrets.UNITY_PASSWORD }}
          outputs: |
            type=docker
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=min

      - name: Prepare secrets and license dir
        run: |
          [ -n "${{ secrets.UNITY_SERIAL }}" ] || { echo "UNITY_SERIAL is not configured."; exit 1; }
          [ -n "${{ secrets.UNITY_USER }}" ] || { echo "UNITY_USER is not configured."; exit 1; }
          [ -n "${{ secrets.UNITY_PASSWORD }}" ] || { echo "UNITY_PASSWORD is not configured."; exit 1; }

          echo "::add-mask::${{ secrets.UNITY_SERIAL }}"
          echo "::add-mask::${{ secrets.UNITY_USER }}"
          masked="${{ secrets.UNITY_SERIAL }}"
          masked="${masked%????}XXXX"
          echo "::add-mask::$masked"
          echo "LIC_DIR=$RUNNER_TEMP/unity-lic" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/unity-lic"
          mkdir -p "$RUNNER_TEMP/unity-secrets"
          mkdir -p "$RUNNER_TEMP/test-results"
          install -m 600 /dev/null "$RUNNER_TEMP/unity-secrets/unity_serial"
          install -m 600 /dev/null "$RUNNER_TEMP/unity-secrets/unity_user"
          install -m 600 /dev/null "$RUNNER_TEMP/unity-secrets/unity_password"
          printf '%s' '${{ secrets.UNITY_SERIAL }}' > "$RUNNER_TEMP/unity-secrets/unity_serial"
          printf '%s' '${{ secrets.UNITY_USER }}' > "$RUNNER_TEMP/unity-secrets/unity_user"
          printf '%s' '${{ secrets.UNITY_PASSWORD }}' > "$RUNNER_TEMP/unity-secrets/unity_password"

      - name: Run tests
        id: unity-tests
        continue-on-error: true
        run: |
          set -euo pipefail
          size_bytes=$(docker image inspect "${{ env.IMAGE_TAG }}" --format='{{.Size}}')
          size_mib=$(awk -v b="$size_bytes" 'BEGIN{printf "%.2f", b/1024/1024}')
          echo "Docker image size: ${size_mib} MiB"

          docker run --rm \
            -e CONDUIT_SERVER_EXECUTABLE=/ConduitServer/conduit-linux-x64 \
            -v "$GITHUB_WORKSPACE/Conduit.Unity:$PROJECT/Packages/dev.tryfinally.conduit" \
            -v "$GITHUB_WORKSPACE:${{ env.REPO_ROOT }}" \
            -v "$RUNNER_TEMP/conduit-server:/ConduitServer:ro" \
            -v "$RUNNER_TEMP/test-results:$PROJECT/test-results" \
            -v "$LIC_DIR:/root/.local/share/unity3d" \
            -v "$RUNNER_TEMP/unity-secrets:/run/secrets:ro" \
            -w $PROJECT \
            "${{ env.IMAGE_TAG }}" \
            unity-editor \
              -login \
              -projectPath $PROJECT \
              -executeMethod Conduit.CI.RunTests

      - uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: Unity Test Results (${{ matrix.UNITY_VERSION }})
          reporter: dotnet-nunit
          path: "${{ runner.temp }}/test-results/*tests.xml"
          fail-on-error: false

      - name: Fail on Unity test errors
        if: steps.unity-tests.outcome == 'failure'
        run: exit 1

  prepare:
    if: needs.version.outputs.release_requested == 'true'
    needs: [version, build, test-server, test-unity]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ref: ${{ steps.target.outputs.ref }}
      sha: ${{ steps.push.outputs.sha }}
      version_new: ${{ steps.prepare.outputs.new }}
    env:
      PACKAGE_JSON: Conduit.Unity/package.json

    steps:
      - name: Record target ref
        id: target
        shell: bash
        run: echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply planned version bump
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          current="$(jq -r '.version' "$PACKAGE_JSON")"
          next="${{ needs.version.outputs.package_version }}"
          tmp="$PACKAGE_JSON.tmp"
          jq --arg v "$next" '.version = $v' "$PACKAGE_JSON" > "$tmp"
          mv "$tmp" "$PACKAGE_JSON"

          echo "new=$next" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        if: steps.prepare.outputs.new != ''
        id: push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PACKAGE_JSON"
          git commit -m "${{ github.event.repository.name }} ${{ steps.prepare.outputs.new }} [release] [skip ci]"

          ref="${{ steps.target.outputs.ref }}"
          base_sha="${{ github.sha }}"
          git fetch origin "$ref" --quiet
          remote_sha="$(git rev-parse "origin/$ref")"
          if [[ "$remote_sha" != "$base_sha" ]]; then
            echo "::notice::Remote branch '$ref' advanced to $remote_sha; cancelling release."
            exit 0
          fi

          git push origin "HEAD:$ref"
          git tag "v${{ steps.prepare.outputs.new }}"
          git push origin "v${{ steps.prepare.outputs.new }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    if: needs.prepare.outputs.sha != ''
    needs: [version, prepare]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          pattern: conduit-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes="release-notes.md"
          upper="${{ needs.prepare.outputs.sha }}"
          repo_url="https://github.com/${{ github.repository }}"
          package_url="$repo_url.git?path=/Conduit.Unity#release"
          unity_version="$(jq -r '.unity' Conduit.Unity/package.json)"
          prev_tag="${{ needs.version.outputs.previous_tag }}"

          declare -A since=()
          if [[ -n "${prev_tag:-}" ]]; then
            while read -r s; do
              [[ -n "$s" ]] && since["$s"]=1
            done < <(git rev-list "${prev_tag}..$upper")
          fi

          ref="${{ needs.prepare.outputs.ref }}"
          cat > "$notes" <<MD

          This is a rolling release. Whenever all tests pass, it is automatically updated
          to point to the latest release tag.

          Installation
          --------------
          Compatibility: ***Unity $unity_version or newer***

          Recommended method:
          - Window ⟶ Package Manager ⟶ \`+\` ⟶ "Install package from git URL"
          - Paste the URL
          \`\`\`md
          $package_url
          \`\`\`
          Latest changes
          --------------
          | Author | Release | Commit | SHA |
          |---|---|---|---|
          MD

          limit=16
          count=0

          mapfile -t rel_tags < <(git for-each-ref --sort=creatordate --format='%(refname:short)' refs/tags | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)

          git log -n 24 "$upper" --pretty=format:%H%x09%s%x09%an%x09%ae |
          while IFS=$'\t' read -r sha msg author email; do
            lc_author="$(printf '%s' "$author" | tr '[:upper:]' '[:lower:]')"
            lc_email="$(printf '%s' "$email" | tr '[:upper:]' '[:lower:]')"
            if [[ "$lc_author" == "github-actions[bot]" || "$lc_email" == "41898282+github-actions[bot]@users.noreply.github.com" ]]; then
              continue
            fi

            short="${sha:0:7}"
            shortlink="[$short]($repo_url/commit/$sha)"
            msg="${msg//|/\\|}"

            new_prefix=""
            if [[ -n "${since[$sha]:-}" ]]; then
              new_prefix="✨ "
            fi

            info="$(gh api repos/$GITHUB_REPOSITORY/commits/$sha --jq '{email: .commit.author.email, login: (.author.login // .committer.login), profile: (.author.html_url // .committer.html_url), avatar: (.author.avatar_url // .committer.avatar_url)}')"
            login="$(jq -r '.login // empty' <<<"$info")"
            login_display="${login%\[bot\]}"
            profile="$(jq -r '.profile // empty' <<<"$info")"
            avatar_url="$(jq -r '.avatar // empty' <<<"$info")"

            if [[ -n "$avatar_url" && "$avatar_url" != "null" ]]; then
              avatar="$avatar_url"
            else
              email_lookup="$(jq -r '.email // empty' <<<"$info" | tr '[:upper:]' '[:lower:]')"
              if [[ -n "$email_lookup" ]]; then
                hash="$(printf '%s' "$email_lookup" | md5sum | awk '{print $1}')"
                base="www.gravatar.com/avatar/$hash?d=identicon"
              else
                base="www.gravatar.com/avatar/?d=mp"
              fi
              avatar="https://wsrv.nl/?url=${base}&w=48&h=48&mask=circle&fit=cover&maxage=1w"
            fi

            author_text="$author"
            author_text="${author_text//|/\\|}"
            author_text="${author_text%\[bot\]}"

            if [[ -n "$login" && "$login" != "null" && -n "$profile" && "$profile" != "null" ]]; then
              author_cell="<a href=\"$profile\"><img src=\"$avatar\" width=\"24\" height=\"24\" /></a> @$login_display"
            else
              author_cell="<img src=\"$avatar\" width=\"24\" height=\"24\" /> $author_text"
            fi

            version="-"
            for t in "${rel_tags[@]}"; do
              tcommit="$(git rev-list -n 1 "$t")"
              if git merge-base --is-ancestor "$sha" "$tcommit"; then
                version="$t"
                break
              fi
            done
            version="${new_prefix}${version}"

            printf '| %s | %s | %s | %s |\n' "$author_cell" "$version" "$msg" "$shortlink" >> "$notes"

            count=$((count + 1))
            if [[ $count -ge $limit ]]; then
              break
            fi
          done

          if [[ -n "${prev_tag:-}" ]]; then
            printf '\n#### [View diff since previous tagged release](%s/compare/%s...release)\n' "$repo_url" "$prev_tag" >> "$notes"
          fi
          printf '#### [More recent commits](%s/commits/%s/)\n' "$repo_url" "$ref" >> "$notes"

          cat "$notes" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify release target
        id: verify
        shell: bash
        run: |
          ref="${{ needs.prepare.outputs.ref }}"
          release_sha="${{ needs.prepare.outputs.sha }}"

          git fetch origin "$ref" --quiet
          remote_sha="$(git rev-parse "origin/$ref")"
          if [[ "$remote_sha" != "$release_sha" ]]; then
            echo "::notice::Remote branch '$ref' advanced from $release_sha to $remote_sha; cancelling release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Release skipped"
              echo
              echo "The branch no longer points to the release commit."
              echo
              echo "- Ref: \`$ref\`"
              echo "- Release commit: \`$release_sha\`"
              echo "- Current tip: \`$remote_sha\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update rolling release
        if: steps.verify.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag="release"
          title="v${{ needs.prepare.outputs.version_new }} ($(date -u '+%d-%m-%Y'))"
          notes="release-notes.md"

          git tag -fa "$tag" "${{ needs.prepare.outputs.sha }}" -m "Latest rolling release"
          git push -f origin "refs/tags/$tag"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes" --latest
          else
            gh release create "$tag" --title "$title" --notes-file "$notes" --target "${{ needs.prepare.outputs.sha }}" --latest
          fi

          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if [ "${#files[@]}" -gt 0 ]; then
            gh release upload "$tag" "${files[@]}" --clobber
          fi
